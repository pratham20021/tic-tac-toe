<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { font-size: 2rem; margin-bottom: 16px; color: #e94560; }
        #status { font-size: 1.2rem; margin-bottom: 20px; min-height: 28px; }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            grid-template-rows: repeat(3, 110px);
            gap: 8px;
        }
        .cell {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 8px;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .cell:hover { background: #0f3460; }
        .cell.x { color: #e94560; }
        .cell.o { color: #53d8fb; }
        #reset {
            margin-top: 24px;
            padding: 10px 32px;
            font-size: 1rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #reset:hover { background: #c73652; }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div id="status">Player X's turn</div>
    <div id="board">
        <div class="cell" onclick="move(0)"></div>
        <div class="cell" onclick="move(1)"></div>
        <div class="cell" onclick="move(2)"></div>
        <div class="cell" onclick="move(3)"></div>
        <div class="cell" onclick="move(4)"></div>
        <div class="cell" onclick="move(5)"></div>
        <div class="cell" onclick="move(6)"></div>
        <div class="cell" onclick="move(7)"></div>
        <div class="cell" onclick="move(8)"></div>
    </div>
    <button id="reset" onclick="reset()">Restart</button>

    <script>
        const cells = document.querySelectorAll('.cell');
        const status = document.getElementById('status');

        function render(state) {
            state.board.forEach((val, i) => {
                cells[i].textContent = val;
                cells[i].className = 'cell' + (val ? ' ' + val.toLowerCase() : '');
            });
            if (state.winner) {
                status.textContent = `🎉 Player ${state.winner} wins!`;
            } else if (state.draw) {
                status.textContent = "It's a draw!";
            } else {
                status.textContent = `Player ${state.currentPlayer}'s turn`;
            }
        }

        async function move(index) {
            const res = await fetch('/api/game/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index })
            });
            const data = await res.json();
            if (data.success) render(data.state);
        }

        async function reset() {
            const res = await fetch('/api/game/reset', { method: 'POST' });
            const state = await res.json();
            render(state);
        }

        // Load initial state
        fetch('/api/game').then(r => r.json()).then(render);
    </script>
</body>
</html>
